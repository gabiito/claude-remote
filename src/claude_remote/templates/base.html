<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#1e1e2e">
  <title>{% block title %}claude-remote{% endblock %}</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  <script src="https://unpkg.com/alpinejs@3.14.3" defer></script>
</head>
<body x-data="{
  updateTitle(detail) {
    const needs = detail.needs;
    const domain = detail.domain;
    const name = detail.name;
    if (needs && domain && name) {
      document.title = '🔴 ' + domain + '/' + name + ' — claude-remote';
    } else if (domain && name) {
      document.title = domain + '/' + name + ' — claude-remote';
    }
  }
}" x-on:title-update.window="updateTitle($event.detail)">
  {% block content %}{% endblock %}
  <script src="/static/js/app.js" defer></script>
</body>
</html>
