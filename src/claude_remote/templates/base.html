<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#1e1e2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>{% block title %}Claudio-RC{% endblock %}</title>
  <link rel="manifest" href="{{ asset_url('manifest.json') }}">
  <link rel="icon" href="{{ asset_url('favicon.svg') }}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{{ asset_url('favicon.svg') }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ asset_url('css/app.css') }}">
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  <script src="{{ asset_url('js/push-subscribe.js') }}" defer></script>
  <script src="https://unpkg.com/alpinejs@3.14.3" defer></script>
</head>
<body x-data="{
  toastMessage: '',
  toastVisible: false,
  toastTimer: null,
  updateTitle(detail) {
    const needs = detail.needs;
    const domain = detail.domain;
    const name = detail.name;
    if (needs && domain && name) {
      document.title = '🔴 ' + domain + '/' + name + ' — Claudio-RC';
    } else if (domain && name) {
      document.title = domain + '/' + name + ' — Claudio-RC';
    }
  },
  showToast(detail) {
    this.toastMessage = (detail && detail.message) || '';
    if (!this.toastMessage) return;
    this.toastVisible = true;
    if (this.toastTimer) clearTimeout(this.toastTimer);
    this.toastTimer = setTimeout(() => { this.toastVisible = false }, 3000);
  }
}" x-on:title-update.window="updateTitle($event.detail)"
   x-on:action-toast.window="showToast($event.detail)">
  <div class="cr-htmx-indicator htmx-indicator" aria-hidden="true"></div>
  <div class="cr-action-toast" role="status" aria-live="polite"
       x-show="toastVisible"
       x-transition:enter="cr-toast-enter"
       x-transition:enter-start="cr-toast-enter-start"
       x-transition:enter-end="cr-toast-enter-end"
       x-transition:leave="cr-toast-leave"
       x-transition:leave-start="cr-toast-leave-start"
       x-transition:leave-end="cr-toast-leave-end"
       x-cloak>
    <span x-text="toastMessage"></span>
  </div>
  {% block content %}{% endblock %}
  <script src="{{ asset_url('js/app.js') }}" defer></script>
  <script src="{{ asset_url('js/pull-refresh.js') }}" defer></script>
</body>
</html>
