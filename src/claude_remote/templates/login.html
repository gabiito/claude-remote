<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Sign in — Claudio-RC</title>
  <link rel="icon" href="{{ asset_url('favicon.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ asset_url('css/app.css') }}">
</head>
<body>
  <main class="cr-login">
    <div class="cr-login-inner">
      <div class="cr-brand cr-login-brand">
        <span class="cr-prompt">~/</span><span>Claudio-RC</span>
        <span class="cr-cursor"></span>
      </div>

      <div class="cr-login-conn">
        <span class="cr-login-dot" aria-hidden="true"></span>
        <span>connected · {{ host }}</span>
      </div>

      <form class="cr-login-form" method="post" action="/login">
        {% if error %}
        <div class="cr-field-error" role="alert">{{ error }}</div>
        {% endif %}

        <label class="cr-field-label" for="cr-pw">Password</label>
        <div class="cr-login-field">
          <input id="cr-pw" type="password" name="password"
                 autocomplete="current-password" autofocus
                 {% if not configured %}disabled{% endif %}>
          <button type="button" class="cr-login-eye" id="cr-pw-toggle"
                  aria-label="Show password" tabindex="-1"
                  {% if not configured %}disabled{% endif %}>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <button class="cr-login-submit" type="submit"
                {% if not configured %}disabled{% endif %}>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <rect x="4" y="11" width="16" height="10" rx="2"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
          Unlock
        </button>

        {% if not configured %}
        <p class="cr-login-note">No password set yet. On the server run:
          <code>claudio set-password</code></p>
        {% endif %}
      </form>
    </div>
  </main>
  <script src="{{ asset_url('js/login.js') }}" defer></script>
</body>
</html>
