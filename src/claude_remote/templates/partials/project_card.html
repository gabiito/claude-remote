<div class="project-card" data-project-id="{{ project.id }}">
  <div class="project-card-header">
    <h2 class="project-card-name">{{ project.name }}</h2>
  </div>
  <p class="project-card-meta">{{ project.domain }} / {{ project.slug }}</p>

  {% if instances %}
  <div class="instance-list">
    {% for instance in instances %}
    {% include "partials/instance_row.html" %}
    {% endfor %}
  </div>
  {% endif %}

  <div class="project-card-actions">
    <button
      class="btn btn-primary"
      hx-post="/ui/projects/{{ project.id }}/launch"
      hx-target="closest .project-card"
      hx-swap="outerHTML"
    >Launch</button>
    <button
      class="btn btn-danger"
      hx-delete="/ui/projects/{{ project.id }}"
      hx-target="closest .project-card"
      hx-swap="outerHTML"
      hx-confirm="¿Borrar el proyecto?"
    >Delete</button>
  </div>
</div>
